# rIRCd - Bleeding-edge IRC Server
# https://ircv3.net/irc/

[server]
name = "rIRCd.local"
listen = [":6667"]
# For TLS, add ports to listen_tls and configure [tls] cert/key:
# listen_tls = [":6697"]

# MOTD text displayed to clients on connect (inline, not a file path).
motd = """
Welcome to rIRCd!
An IRCv3 server written in Rust.
"""

# Channels to suggest to clients that support draft/auto-join.
# auto_join = "#general, #help, #dev"

registration_timeout_secs = 60
ping_timeout_secs = 90
disconnect_timeout_secs = 150

[network]
name = "rIRCd"

[database]
host = "localhost"
port = 3306
user = "rirc"
password = "Sunny1-Void8-Twilight0"
database = "rircdb"

[tls]
# Uncomment and set paths to enable TLS on port 6697
# cert = "/etc/rIRCd/cert.pem"
# key  = "/etc/rIRCd/key.pem"

[limits]
max_channels_per_client = 50
max_line_length = 8191

# IRC operators — use: rircd genpasswd   to generate password hashes
# [[opers]]
# name = "admin"
# hostmask = "*"
# password_hash = "$2a$..."
