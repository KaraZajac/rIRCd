name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: rircd-linux-x86_64
            use_cross: false

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: rircd-linux-aarch64
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: rircd-macos-x86_64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: rircd-macos-arm64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install musl-tools (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 Linux)
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/rircd ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x artifacts/rircd-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rircd-linux-x86_64
            artifacts/rircd-linux-aarch64
            artifacts/rircd-macos-x86_64
            artifacts/rircd-macos-arm64
            default-config.toml
            default-motd.txt
            distrib/rircd.service
